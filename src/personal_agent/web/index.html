<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Agent</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e0e0e0;
  --dim: #888;
  --accent: #00d4aa;
  --accent2: #7c83ff;
  --error: #ff6b6b;
  --warning: #f0c040;
  --border: #2a2a4a;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  background: var(--bg); color: var(--text); height: 100vh; display: flex;
}
#sidebar {
  width: 260px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
#sidebar h2 { padding: 16px; font-size: 14px; color: var(--accent); border-bottom: 1px solid var(--border); }
#session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item {
  padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
  margin-bottom: 4px; font-size: 13px; border: 1px solid transparent;
}
.session-item:hover { background: var(--surface2); }
.session-item.active { border-color: var(--accent); background: var(--surface2); }
.session-item .name { font-weight: 600; }
.session-item .meta { font-size: 11px; color: var(--dim); margin-top: 2px; }
#sidebar-actions { padding: 12px; border-top: 1px solid var(--border); }
#sidebar-actions input {
  width: 100%; padding: 8px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 12px; margin-bottom: 6px;
}
#sidebar-actions button {
  width: 100%; padding: 8px; border: none; border-radius: var(--radius);
  background: var(--accent2); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
}
#main {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
}
#header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--dim); display: flex; gap: 16px; align-items: center;
}
#header .status { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
#header .status.disconnected { background: var(--error); }
#messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.msg { max-width: 85%; padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.5; }
.msg.user { align-self: flex-end; background: var(--accent2); color: #fff; }
.msg.answer { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
.msg.thought { align-self: flex-start; font-style: italic; color: var(--dim); font-size: 13px; padding: 4px 14px; }
.msg.tool { align-self: flex-start; background: var(--surface2); font-size: 12px; }
.msg.tool .tool-name { color: var(--accent); font-weight: 600; }
.msg.tool pre { margin-top: 4px; font-size: 11px; color: var(--dim); overflow-x: auto; white-space: pre-wrap; max-height: 120px; }
.msg.error { align-self: flex-start; background: #3d1f1f; color: var(--error); font-size: 13px; }
.msg.status { align-self: center; color: var(--dim); font-size: 12px; }
#input-area {
  padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px;
}
#input-area input {
  flex: 1; padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 14px; outline: none;
}
#input-area input:focus { border-color: var(--accent); }
#input-area button {
  padding: 12px 24px; border: none; border-radius: var(--radius);
  background: var(--accent); color: #000; cursor: pointer; font-size: 14px; font-weight: 700;
}
#input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div id="sidebar">
  <h2>Sessions</h2>
  <div id="session-list"></div>
  <div id="sidebar-actions">
    <input id="new-session-name" placeholder="New session name..." />
    <button onclick="createSession()">+ New Session</button>
  </div>
</div>
<div id="main">
  <div id="header">
    <span id="status-dot" class="status disconnected"></span>
    <span id="status-text">Disconnected</span>
    <span style="flex:1"></span>
    <span id="session-info"></span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="task-input" placeholder="Type a task..." disabled onkeydown="if(event.key==='Enter')sendTask()" />
    <button id="send-btn" disabled onclick="sendTask()">Send</button>
  </div>
</div>

<script>
let ws = null;
let currentSession = null;
let isProcessing = false;

function connect() {
  const host = window.location.hostname || 'localhost';
  const port = window.location.port || '8765';
  ws = new WebSocket(`ws://${host}:${port}`);

  ws.onopen = () => {
    setStatus(true, 'Connected');
    document.getElementById('task-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    refreshSessions();
  };

  ws.onclose = () => {
    setStatus(false, 'Disconnected — reconnecting in 3s...');
    document.getElementById('task-input').disabled = true;
    document.getElementById('send-btn').disabled = true;
    setTimeout(connect, 3000);
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };
}

function setStatus(connected, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status' + (connected ? '' : ' disconnected');
  document.getElementById('status-text').textContent = text;
}

function handleMessage(msg) {
  const container = document.getElementById('messages');
  let el;

  switch (msg.type) {
    case 'thought':
      el = div('msg thought', msg.text);
      break;
    case 'tool_call':
      el = div('msg tool', `<span class="tool-name">🔧 ${msg.name}</span><pre>${JSON.stringify(msg.arguments, null, 2)}</pre>`);
      break;
    case 'tool_result':
      if (msg.error) {
        el = div('msg error', `⚠️ ${msg.name}: ${msg.error}`);
      } else {
        const out = msg.output || '';
        el = div('msg tool', `<span class="tool-name">📋 ${msg.name}</span><pre>${escapeHtml(out)}</pre>`);
      }
      break;
    case 'answer':
      el = div('msg answer', msg.text);
      isProcessing = false;
      updateSendButton();
      break;
    case 'status':
      const parts = [];
      if (msg.token_usage) {
        const t = msg.token_usage;
        parts.push(`${t.total_tokens || (t.input_tokens||0)+(t.output_tokens||0)} tokens`);
      }
      if (msg.elapsed_ms) parts.push(`${(msg.elapsed_ms/1000).toFixed(1)}s`);
      if (msg.steps) parts.push(`${msg.steps} steps`);
      el = div('msg status', parts.join(' | '));
      isProcessing = false;
      updateSendButton();
      break;
    case 'error':
      el = div('msg error', `Error: ${msg.text}`);
      isProcessing = false;
      updateSendButton();
      break;
    case 'session_info':
      currentSession = msg;
      document.getElementById('session-info').textContent = `Session: ${msg.name} (${msg.messages} msgs)`;
      refreshSessions();
      break;
    case 'session_list':
      renderSessionList(msg.sessions);
      break;
    default:
      return;
  }

  if (el) {
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }
}

function sendTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text || isProcessing || !ws) return;

  const container = document.getElementById('messages');
  container.appendChild(div('msg user', text));
  container.scrollTop = container.scrollHeight;

  ws.send(JSON.stringify({ type: 'task', text }));
  input.value = '';
  isProcessing = true;
  updateSendButton();
}

function createSession() {
  const input = document.getElementById('new-session-name');
  const name = input.value.trim();
  if (!name || !ws) return;
  ws.send(JSON.stringify({ type: 'session_create', name }));
  input.value = '';
}

function switchSession(id) {
  if (!ws) return;
  ws.send(JSON.stringify({ type: 'session_switch', id }));
}

function refreshSessions() {
  if (!ws) return;
  ws.send(JSON.stringify({ type: 'session_list' }));
}

function renderSessionList(sessions) {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessions.forEach(s => {
    const isActive = currentSession && s.id === currentSession.id;
    const el = document.createElement('div');
    el.className = 'session-item' + (isActive ? ' active' : '');
    el.innerHTML = `<div class="name">${escapeHtml(s.name)}</div><div class="meta">${s.messages} msgs ${s.channel ? '· '+s.channel : ''}</div>`;
    el.onclick = () => switchSession(s.id);
    list.appendChild(el);
  });
}

function updateSendButton() {
  document.getElementById('send-btn').disabled = isProcessing || !ws;
  document.getElementById('task-input').disabled = isProcessing || !ws;
}

function div(cls, html) {
  const el = document.createElement('div');
  el.className = cls;
  el.innerHTML = html;
  return el;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

connect();
</script>
</body>
</html>
